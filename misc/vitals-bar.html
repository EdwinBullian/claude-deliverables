<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitals</title>
  <style>
    :root {
      color-scheme: light;
      --bg:     #ede5d2;
      --card:   #e3d9c6;
      --border: #cfc4ae;
      --navy:   #1b3a5c;
      --muted:  #7a6d5e;
      --dim:    #b8ad9e;
      --hover:  #e0d5c0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
    }

    .bar {
      display: flex;
      width: 100%;
      border-bottom: 1px solid var(--border);
    }

    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 13px 8px 11px;
      border-right: 1px solid var(--border);
      gap: 3px;
      min-height: 70px;
    }
    .col:last-child { border-right: none; }

    .col.tap { cursor: pointer; transition: background 0.12s; }
    .col.tap:hover { background: var(--hover); }

    .num {
      font-size: 26px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .num.loading {
      font-size: 15px;
      font-weight: 400;
      color: var(--dim);
      opacity: 0.7;
    }

    .lbl {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .hint {
      font-size: 8px;
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    footer {
      text-align: right;
      padding: 2px 10px 3px;
      font-size: 8px;
      color: var(--dim);
      background: var(--card);
      border-top: 1px solid var(--border);
    }

    /* Edit Modal */
    .veil {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(27, 58, 92, 0.18);
      z-index: 99;
      align-items: center;
      justify-content: center;
    }
    .veil.on { display: flex; }

    .modal {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px 16px;
      width: 272px;
      box-shadow: 0 12px 40px rgba(27, 58, 92, 0.16);
    }
    .modal h4 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: var(--navy);
      margin-bottom: 14px;
    }

    .field { margin-bottom: 11px; }
    .field label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #f4ecdc;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      outline: none;
    }
    .field input:focus { border-color: var(--navy); }

    .btns { display: flex; gap: 8px; margin-top: 14px; }
    .btns button {
      flex: 1;
      padding: 7px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .btn-save   { background: var(--navy); color: #f4ecdc; border-color: var(--navy); }
    .btn-cancel { background: transparent; color: var(--muted); }
  </style>
</head>
<body>

  <div class="bar">

    <div class="col" id="c-email">
      <div class="num loading" id="n-email">…</div>
      <div class="lbl">New Today</div>
    </div>

    <div class="col" id="c-nd">
      <div class="num" id="n-nd">—</div>
      <div class="lbl">Days to ND</div>
    </div>

    <div class="col tap" onclick="openModal()">
      <div class="num" id="n-cpct">—</div>
      <div class="lbl">Claude Usage</div>
      <div class="hint">tap to update</div>
    </div>

    <div class="col tap" onclick="openModal()">
      <div class="num" id="n-ctok">—</div>
      <div class="lbl">Claude Tokens</div>
      <div class="hint">tap to update</div>
    </div>

    <div class="col" id="c-hw">
      <div class="num loading" id="n-hw">…</div>
      <div class="lbl">Hrs This Week</div>
    </div>

    <div class="col" id="c-ht">
      <div class="num loading" id="n-ht">…</div>
      <div class="lbl">Hrs Today</div>
    </div>

  </div>

  <footer id="foot">&nbsp;</footer>

  <!-- Edit Modal -->
  <div class="veil" id="veil">
    <div class="modal">
      <h4>Update Claude Usage</h4>
      <div class="field">
        <label>Weekly Usage %</label>
        <input id="i-pct" type="text" placeholder="e.g. 34%" autocomplete="off" />
      </div>
      <div class="field">
        <label>Tokens This Week</label>
        <input id="i-tok" type="text" placeholder="e.g. 1.2M or 450K" autocomplete="off" />
      </div>
      <div class="btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveModal()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const DATA_URL = 'https://edwinbullian.github.io/claude-deliverables/misc/vitals-data.json';

    // ── Notre Dame countdown (always live) ───────────────────────────────
    (function () {
      const nd   = new Date('2026-08-22T00:00:00-07:00');
      const days = Math.max(0, Math.ceil((nd - new Date()) / 86400000));
      document.getElementById('n-nd').textContent = days;
    })();

    // ── Claude — localStorage ────────────────────────────────────────────
    function renderClaude() {
      document.getElementById('n-cpct').textContent = localStorage.getItem('v_cpct') || '—';
      document.getElementById('n-ctok').textContent = localStorage.getItem('v_ctok') || '—';
    }
    renderClaude();

    function openModal() {
      document.getElementById('i-pct').value = localStorage.getItem('v_cpct') || '';
      document.getElementById('i-tok').value = localStorage.getItem('v_ctok') || '';
      document.getElementById('veil').classList.add('on');
      document.getElementById('i-pct').focus();
    }
    function closeModal() {
      document.getElementById('veil').classList.remove('on');
    }
    function saveModal() {
      const p = document.getElementById('i-pct').value.trim();
      const t = document.getElementById('i-tok').value.trim();
      if (p) localStorage.setItem('v_cpct', p);
      if (t) localStorage.setItem('v_ctok', t);
      renderClaude();
      closeModal();
    }
    document.getElementById('veil').addEventListener('click', e => {
      if (e.target.id === 'veil') closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'Enter' && document.getElementById('veil').classList.contains('on')) saveModal();
    });

    // ── Data feed ────────────────────────────────────────────────────────
    function fmtH(h) {
      if (h == null || isNaN(h)) return '—';
      const w = Math.floor(h);
      const m = Math.round((h - w) * 60);
      return m > 0 ? `${w}h ${m}m` : `${w}h`;
    }

    function setVal(id, text) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.classList.remove('loading');
    }

    function setError() {
      ['n-email','n-hw','n-ht'].forEach(id => setVal(id, '—'));
      document.getElementById('foot').textContent = 'data unavailable — refresh to retry';
    }

    fetch(DATA_URL + '?_=' + Date.now())
      .then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(d => {
        setVal('n-email', d.emails ?? '—');
        setVal('n-hw', fmtH(d.hours_week));
        setVal('n-ht', fmtH(d.hours_today));

        if (d.updated) {
          const ts = new Date(d.updated);
          document.getElementById('foot').textContent =
            'Updated ' + ts.toLocaleString('en-US', {
              timeZone: 'America/Los_Angeles',
              month: 'short', day: 'numeric',
              hour: 'numeric', minute: '2-digit', hour12: true
            }) + ' PST';
        }
      })
      .catch(setError);
  </script>
</body>
</html>
