<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitals</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:     #191919;
      --card:   #2f2f2f;
      --border: #424242;
      --text:   #e6e6e6;
      --num:    #ffffff;
      --muted:  #9b9b9b;
      --dim:    #555555;
      --hover:  #3a3a3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      height: 100%;
      overflow: hidden;
    }

    .frame {
      margin: 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      padding: 4px;
    }

    .bar {
      display: flex;
      gap: 3px;
      height: calc(100vh - 18px);
      min-height: 60px;
    }

    .col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 7px;
      gap: 5px;
      padding: 8px 4px;
      min-width: 0;
    }

    .col.tap { cursor: pointer; transition: background 0.12s; }
    .col.tap:hover { background: var(--hover); }

    .num {
      font-size: 26px;
      font-weight: 700;
      color: var(--num);
      letter-spacing: -0.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .num.loading { font-size: 14px; font-weight: 400; color: var(--dim); }

    .lbl {
      font-size: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Modal */
    .veil {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 99;
      align-items: center; justify-content: center;
    }
    .veil.on { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 22px 16px; width: 272px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .modal h4 {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.11em; color: var(--text); margin-bottom: 14px;
    }
    .field { margin-bottom: 11px; }
    .field label {
      display: block; font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px;
    }
    .field input {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 6px; background: #252525; font-family: inherit;
      font-size: 14px; font-weight: 600; color: var(--text); outline: none;
    }
    .field input:focus { border-color: #666; }
    .btns { display: flex; gap: 8px; margin-top: 14px; }
    .btns button {
      flex: 1; padding: 7px; border-radius: 6px; font-family: inherit;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; cursor: pointer; border: 1px solid var(--border);
    }
    .btn-save   { background: var(--text); color: #191919; border-color: var(--text); }
    .btn-cancel { background: transparent; color: var(--muted); }
  </style>
</head>
<body>

<div class="frame">
  <div class="bar">

    <div class="col tap" onclick="openModal()">
      <div class="num" id="n-cpct">—</div>
      <div class="lbl">Claude Usage</div>
    </div>

    <div class="col tap" onclick="openModal()">
      <div class="num" id="n-ctok">—</div>
      <div class="lbl">Claude Tokens</div>
    </div>

    <div class="col">
      <div class="num loading" id="n-email">…</div>
      <div class="lbl">Unread Emails</div>
    </div>

    <div class="col">
      <div class="num loading" id="n-hw">…</div>
      <div class="lbl">Hrs This Week</div>
    </div>

    <div class="col">
      <div class="num loading" id="n-ht">…</div>
      <div class="lbl">Hrs Today</div>
    </div>

    <div class="col">
      <div class="num loading" id="n-tasks">…</div>
      <div class="lbl">Tasks Today</div>
    </div>

    <div class="col">
      <div class="num loading" id="n-xp">…</div>
      <div class="lbl">Weekly XP</div>
    </div>

    <div class="col">
      <div class="num" id="n-nd">—</div>
      <div class="lbl">Days to ND</div>
    </div>

  </div>
</div>

<!-- Edit Modal -->
<div class="veil" id="veil">
  <div class="modal">
    <h4>Update Claude Usage</h4>
    <div class="field">
      <label>Weekly Usage %</label>
      <input id="i-pct" type="text" placeholder="e.g. 34%" autocomplete="off" />
    </div>
    <div class="field">
      <label>Tokens This Week</label>
      <input id="i-tok" type="text" placeholder="e.g. 1.2M or 450K" autocomplete="off" />
    </div>
    <div class="btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
  const DATA_URL = 'https://edwinbullian.github.io/claude-deliverables/misc/vitals-data.json';

  // ── ND countdown ──────────────────────────────────────────────────────
  (function() {
    const nd = new Date('2026-08-22T00:00:00-07:00');
    document.getElementById('n-nd').textContent =
      Math.max(0, Math.ceil((nd - new Date()) / 86400000));
  })();

  // ── Claude (localStorage) ─────────────────────────────────────────────
  function renderClaude() {
    document.getElementById('n-cpct').textContent = localStorage.getItem('v_cpct') || '—';
    document.getElementById('n-ctok').textContent = localStorage.getItem('v_ctok') || '—';
  }
  renderClaude();

  function openModal() {
    document.getElementById('i-pct').value = localStorage.getItem('v_cpct') || '';
    document.getElementById('i-tok').value = localStorage.getItem('v_ctok') || '';
    document.getElementById('veil').classList.add('on');
    document.getElementById('i-pct').focus();
  }
  function closeModal() { document.getElementById('veil').classList.remove('on'); }
  function saveModal() {
    const p = document.getElementById('i-pct').value.trim();
    const t = document.getElementById('i-tok').value.trim();
    if (p) localStorage.setItem('v_cpct', p);
    if (t) localStorage.setItem('v_ctok', t);
    renderClaude(); closeModal();
  }
  document.getElementById('veil').addEventListener('click', e => {
    if (e.target.id === 'veil') closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('veil').classList.contains('on')) saveModal();
  });

  // ── Helpers ───────────────────────────────────────────────────────────
  function fmtH(h) {
    if (h == null || isNaN(h)) return '—';
    const w = Math.floor(h), m = Math.round((h - w) * 60);
    return m > 0 ? `${w}h ${m}m` : `${w}h`;
  }
  function setVal(id, text) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.classList.remove('loading');
  }

  // ── JSON feed ─────────────────────────────────────────────────────────
  fetch(DATA_URL + '?_=' + Date.now())
    .then(r => { if (!r.ok) throw 0; return r.json(); })
    .then(d => {
      setVal('n-email',  d.emails      ?? '—');
      setVal('n-hw',     fmtH(d.hours_week));
      setVal('n-ht',     fmtH(d.hours_today));
      setVal('n-tasks',  d.tasks_today ?? '—');
      setVal('n-xp',     d.weekly_xp != null ? d.weekly_xp.toLocaleString() : '—');
    })
    .catch(() => {
      ['n-email','n-hw','n-ht','n-tasks','n-xp'].forEach(id => setVal(id, '—'));
    });
</script>
</body>
</html>
