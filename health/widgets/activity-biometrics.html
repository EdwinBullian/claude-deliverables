<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:290px;overflow:hidden;background:#191919;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif}
  body{display:flex;flex-direction:column;padding:14px 18px 10px}

  .stats-heading{font-size:9.5px;font-weight:700;text-transform:uppercase;
    letter-spacing:.6px;color:rgba(255,255,255,.35);margin-bottom:12px}

  /* Today row */
  .today-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
  .stat{display:flex;flex-direction:column;gap:3px}
  .stat .val{font-size:22px;font-weight:800;color:#f0f0f0;line-height:1}
  .stat .val.blue{color:#5aaed4}
  .stat .val.green{color:#6bda87}
  .stat .lbl{font-size:8.5px;font-weight:700;text-transform:uppercase;
              letter-spacing:.3px;color:rgba(255,255,255,.35)}

  .divider{height:1px;background:rgba(255,255,255,.08);margin:10px 0}

  /* Weekly grid */
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .day-cell{display:flex;flex-direction:column;align-items:center;gap:2px}
  .day-lbl{font-size:8.5px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase}
  .day-lbl.today{color:#5aaed4}

  /* Mini step bars */
  .bar-track{width:100%;height:36px;background:rgba(255,255,255,.06);border-radius:3px;
             display:flex;align-items:flex-end;overflow:hidden}
  .bar-fill{width:100%;border-radius:3px 3px 0 0}
  .bar-fill.today-bar{background:rgba(90,174,212,.85)}
  .bar-fill.normal-bar{background:rgba(45,125,210,.65)}
  .bar-fill.empty-bar{background:transparent}

  .step-val{font-size:7px;color:rgba(255,255,255,.3);text-align:center}
  .rhr-val{font-size:10px;font-weight:700;text-align:center}
  .rhr-val.low{color:#6bda87}
  .rhr-val.norm{color:rgba(255,255,255,.65)}
  .rhr-val.high{color:#e8943a}

  /* Workout strip */
  .workout-strip{background:rgba(255,255,255,.04);border-radius:6px;
                 padding:7px 10px;margin-top:10px;
                 display:flex;align-items:center;gap:8px}
  .workout-strip .wlbl{font-size:9px;font-weight:700;text-transform:uppercase;
                        letter-spacing:.4px;color:#5aaed4;flex-shrink:0}
  .workout-strip .wval{font-size:11.5px;font-weight:600;color:rgba(255,255,255,.7)}
  .dot{color:rgba(255,255,255,.2);margin:0 4px}
</style>
</head>
<body>

<div class="stats-heading">May 23 — Today</div>

<div class="today-row">
  <div class="stat">
    <span class="val green">52</span>
    <span class="lbl">RHR bpm</span>
  </div>
  <div class="stat">
    <span class="val">5,369</span>
    <span class="lbl">Steps</span>
  </div>
  <div class="stat">
    <span class="val blue">70</span>
    <span class="lbl">Avg HR</span>
  </div>
  <div class="stat">
    <span class="val">81</span>
    <span class="lbl">Sleep score</span>
  </div>
</div>

<div class="divider"></div>

<!-- Weekly bar grid -->
<div class="week-grid" id="grid"></div>

<!-- Today workout -->
<div class="workout-strip">
  <span class="wlbl">Workout</span>
  <span class="wval">Strength<span class="dot">·</span>47 min<span class="dot">·</span>225 cal<span class="dot">·</span>avg HR 98</span>
</div>

<script>
const days  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const steps = [null, 9666, 9757, 7815, 6200, 2797, 5369];
const rhr   = [null,   54,   54,   54,   60,   55,   52];
const max   = Math.max(...steps.filter(Boolean));

const grid = document.getElementById('grid');
days.forEach((d, i) => {
  const isToday  = i === 6;
  const hasData  = steps[i] !== null;
  const pct      = hasData ? (steps[i] / max * 100).toFixed(1) : 0;

  let rhrClass = 'norm';
  if (hasData) rhrClass = rhr[i] <= 53 ? 'low' : rhr[i] >= 58 ? 'high' : 'norm';

  const cell = document.createElement('div');
  cell.className = 'day-cell';
  cell.innerHTML = `
    <div class="day-lbl${isToday?' today':''}">${d}</div>
    <div class="bar-track">
      <div class="bar-fill ${isToday?'today-bar':hasData?'normal-bar':'empty-bar'}"
           style="height:${pct}%"></div>
    </div>
    <div class="step-val">${hasData ? (steps[i]/1000).toFixed(1)+'k' : '—'}</div>
    <div class="rhr-val ${rhrClass}">${hasData ? rhr[i] : '—'}</div>
  `;
  grid.appendChild(cell);
});
</script>
</body>
</html>
