<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 290px; overflow: hidden;
      background: #191919;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    }
    body { display: flex; align-items: center; padding: 0 18px; gap: 0; }

    .ring-wrap {
      position: relative; width: 200px; height: 200px; flex-shrink: 0;
    }
    .ring-wrap svg { width: 200px; height: 200px; }
    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .score-num { font-size: 42px; font-weight: 800; color: #f0f0f0; line-height: 1; }
    .score-label {
      font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(255,255,255,0.38); margin-top: 4px;
    }
    .score-dur { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.65); margin-top: 6px; }

    .stats { flex: 1; padding-left: 18px; }
    .stats-heading {
      font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: rgba(255,255,255,0.35); margin-bottom: 13px;
    }
    .stage-row { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; }
    .stage-row:last-of-type { margin-bottom: 0; }
    .swatch { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
    .stage-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.75); width: 36px; }
    .bar-bg { flex: 1; height: 6px; background: #2a2a2a; border-radius: 3px; overflow: hidden; }
    .bar    { height: 100%; border-radius: 3px; }
    .stage-val { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6); width: 48px; text-align: right; }

    .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 13px 0; }
    .meta { font-size: 11.5px; color: rgba(255,255,255,0.38); line-height: 1.8; }
    .meta strong { color: rgba(255,255,255,0.6); font-weight: 600; }
  </style>
</head>
<body>
  <!-- v2 · r=84, C=2π×84≈527.79 -->
  <!-- Deep  52/490=10.6% → arc=55.95 offset=0       -->
  <!-- Light 292/490=59.6% → arc=314.56 offset=-55.95  -->
  <!-- REM   146/490=29.8% → arc=157.28 offset=-370.51 -->
  <div class="ring-wrap">
    <svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg">
      <circle cx="105" cy="105" r="84" fill="none" stroke="#252525" stroke-width="20"/>
      <circle cx="105" cy="105" r="84" fill="none" stroke="#2d7dd2" stroke-width="20"
        stroke-dasharray="55.95 471.84" stroke-dashoffset="0"
        stroke-linecap="butt" transform="rotate(-90 105 105)"/>
      <circle cx="105" cy="105" r="84" fill="none" stroke="#5aaed4" stroke-width="20"
        stroke-dasharray="314.56 213.23" stroke-dashoffset="-55.95"
        stroke-linecap="butt" transform="rotate(-90 105 105)"/>
      <circle cx="105" cy="105" r="84" fill="none" stroke="#94cfe3" stroke-width="20"
        stroke-dasharray="157.28 370.51" stroke-dashoffset="-370.51"
        stroke-linecap="butt" transform="rotate(-90 105 105)"/>
    </svg>
    <div class="ring-center">
      <span class="score-num">73</span>
      <span class="score-label">Sleep Score</span>
      <span class="score-dur">8 h 10 m</span>
    </div>
  </div>

  <div class="stats">
    <div class="stats-heading">May 22 — Last Night</div>
    <div class="stage-row">
      <div class="swatch" style="background:#2d7dd2"></div>
      <span class="stage-name">Deep</span>
      <div class="bar-bg"><div class="bar" style="background:#2d7dd2;width:10.6%"></div></div>
      <span class="stage-val">52 min</span>
    </div>
    <div class="stage-row">
      <div class="swatch" style="background:#5aaed4"></div>
      <span class="stage-name">Light</span>
      <div class="bar-bg"><div class="bar" style="background:#5aaed4;width:59.6%"></div></div>
      <span class="stage-val">4h 52m</span>
    </div>
    <div class="stage-row">
      <div class="swatch" style="background:#94cfe3"></div>
      <span class="stage-name">REM</span>
      <div class="bar-bg"><div class="bar" style="background:#94cfe3;width:29.8%"></div></div>
      <span class="stage-val">2h 26m</span>
    </div>
    <div class="stage-row">
      <div class="swatch" style="background:#2a2a2a;border:1px solid #444"></div>
      <span class="stage-name">Awake</span>
      <div class="bar-bg"><div class="bar" style="background:#444;width:1%"></div></div>
      <span class="stage-val">4 min</span>
    </div>
    <div class="divider"></div>
    <div class="meta">
      <strong>Bed</strong> 1:52 AM &nbsp;·&nbsp; <strong>Wake</strong> 10:06 AM<br>
      <strong>RHR</strong> 55 bpm &nbsp;·&nbsp; <strong>Awakenings</strong> 3
    </div>
  </div>
</body>
</html>
