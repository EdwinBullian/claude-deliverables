<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 200px; overflow: hidden;
      background: #191919;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { padding: 10px 16px 6px; display: flex; flex-direction: column; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .title {
      font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: rgba(255,255,255,0.35);
    }
    .badge {
      font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
      background: rgba(255,183,77,0.15); color: rgba(255,183,77,0.8);
      border: 1px solid rgba(255,183,77,0.2);
    }
    .chart-wrap { flex: 1; position: relative; min-height: 0; }
    .unlock {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 5px; padding: 4px 10px; margin-top: 5px;
      font-size: 10px; color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">W21 Training Sessions — May 18–24</span>
    <span class="badge">5 session target</span>
  </div>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div class="unlock">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="8" rx="1.5" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/></svg>
    Log weights in Notion Workout Tracker to unlock progressive overload chart
  </div>

<script>
Chart.defaults.color = 'rgba(255,255,255,0.38)';
Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';

// Mon=0,Tue=0,Wed=0,Thu=42min(May21),Fri=10min(May22),Sat=0(today),Sun=0
const data = [0,0,0,42,10,0,0];
const labels = ['Mon 5/18','Tue 5/19','Wed 5/20','Thu 5/21','Fri 5/22','Sat 5/23','Sun 5/24'];
const colors = data.map((d,i) => {
  if (i === 5) return 'rgba(232,148,58,0.55)';   // today
  if (d > 0)  return 'rgba(74,144,196,0.75)';    // active
  return 'rgba(255,255,255,0.08)';               // rest
});

new Chart(document.getElementById('chart').getContext('2d'), {
  type: 'bar',
  data: {
    labels,
    datasets: [{
      label: 'Session (min)',
      data,
      backgroundColor: colors,
      borderRadius: 4, borderSkipped: false,
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false, animation: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#2a2a2a', titleColor: '#f0f0f0',
        bodyColor: 'rgba(255,255,255,0.65)', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
        callbacks: {
          label: ctx => ctx.raw === 0 ? ' Rest / no data' : ` ${ctx.raw} min session`,
          afterLabel: ctx => ({ 3: '  262 cal  ·  avg HR 116  ·  TE 18', 4: '  53 cal  ·  avg HR 104' })[ctx.dataIndex] || ''
        }
      }
    },
    scales: {
      x: {
        ticks: { font: { size: 9 }, color: 'rgba(255,255,255,0.35)', maxRotation: 0 },
        grid: { display: false }, border: { display: false }
      },
      y: {
        min: 0, max: 60,
        ticks: { font: { size: 9.5 }, stepSize: 15, color: 'rgba(255,255,255,0.35)',
          callback: v => v === 0 ? '' : `${v}m` },
        grid: { color: 'rgba(255,255,255,0.05)' }, border: { display: false },
        title: { display: true, text: 'minutes', font: { size: 9 }, color: 'rgba(255,255,255,0.25)' }
      }
    }
  }
});
</script>
</body>
</html>
