<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 210px; overflow: hidden;
      background: #e4d9c4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { padding: 10px 16px 6px; display: flex; flex-direction: column; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .title {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: #7a6a55;
    }
    .badge {
      font-size: 9.5px; font-weight: 600;
      padding: 2px 7px; border-radius: 10px;
      background: #fff3cd; color: #7a5c00;
    }
    .chart-wrap { flex: 1; position: relative; min-height: 0; }
    .unlock-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #f5f0e8;
      border: 1px dashed #c0a870;
      border-radius: 6px;
      padding: 5px 10px;
      margin-top: 6px;
      font-size: 10.5px;
      color: #7a5c00;
    }
    .unlock-bar svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">W21 Training Sessions — May 18–24</span>
    <span class="badge">W21 · 5 session target</span>
  </div>

  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>

  <div class="unlock-bar">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="#c0a870" stroke-width="1.5"/>
      <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="#c0a870" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Log weights in the Notion Workout Tracker after each session to unlock the progressive overload chart
  </div>

<script>
const ctx = document.getElementById('chart').getContext('2d');

// May 18(Mon)=0, 19(Tue)=0, 20(Wed)=0, 21(Thu)=42min main+warmups, 22(Fri)=10min, 23(Sat)=0, 24(Sun)=0
// Colors: active = navy, rest = light, today = accent
const durations = [0, 0, 0, 42, 10, 0, 0];
const labels = ['Mon\n5/18', 'Tue\n5/19', 'Wed\n5/20', 'Thu\n5/21', 'Fri\n5/22', 'Sat\n5/23', 'Sun\n5/24'];
const shortLabels = ['Mon 5/18', 'Tue 5/19', 'Wed 5/20', 'Thu 5/21', 'Fri 5/22', 'Sat 5/23', 'Sun 5/24'];

const bgColors = durations.map((d, i) => {
  if (i === 5) return 'rgba(192,105,43,0.5)'; // today (Sat) - highlighted
  if (d > 0) return 'rgba(27,58,92,0.75)';
  return 'rgba(200,185,154,0.55)';
});

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: shortLabels,
    datasets: [{
      label: 'Session (min)',
      data: durations,
      backgroundColor: bgColors,
      borderRadius: 4,
      borderSkipped: false,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(27,58,92,0.92)',
        titleFont: { size: 11 },
        bodyFont: { size: 11 },
        callbacks: {
          label: (ctx) => ctx.raw === 0 ? ' Rest day' : ` ${ctx.raw} min session`,
          afterLabel: (ctx) => {
            const notes = { 3: '262 cal · avg HR 116 · TE 18', 4: '53 cal · avg HR 104' };
            return notes[ctx.dataIndex] ? `  ${notes[ctx.dataIndex]}` : '';
          }
        }
      }
    },
    scales: {
      x: {
        ticks: { font: { size: 9.5 }, color: '#7a6a55', maxRotation: 0 },
        grid: { display: false },
        border: { display: false }
      },
      y: {
        min: 0, max: 60,
        ticks: { font: { size: 9.5 }, color: '#7a6a55', stepSize: 15,
          callback: (v) => v === 0 ? '' : `${v}m`
        },
        grid: { color: 'rgba(27,58,92,0.07)' },
        border: { display: false },
        title: { display: true, text: 'minutes', font: { size: 9 }, color: '#7a6a55' }
      }
    }
  }
});
</script>
</body>
</html>
