<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:310px;overflow:hidden;background:#191919;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif}
  body{display:flex;flex-direction:column;padding:12px 18px 8px}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.35)}
  .readout{font-size:9px;font-weight:700;color:#94cfe3;letter-spacing:.3px;white-space:nowrap;
    transition:color .12s ease}
  .readout.scrubbing{color:#bfe6f4}
  .readout .val{color:#fff}
  .body{display:flex;gap:14px;flex:1;min-height:0}
  .chart-wrap{flex:1;position:relative;min-height:0;cursor:crosshair;touch-action:none}
  .side{width:120px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;justify-content:center}
  .win{display:flex;flex-direction:column;gap:2px}
  .win-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:rgba(255,255,255,.32)}
  .win-time{font-size:10px;font-weight:700;color:#5aaed4}
  .win-desc{font-size:8px;color:rgba(255,255,255,.42);line-height:1.3}
  .win-divider{height:1px;background:rgba(255,255,255,.06)}
  .footer{font-size:7.5px;color:rgba(90,174,212,.40);margin-top:3px;padding-top:3px;border-top:1px solid rgba(255,255,255,.06)}
</style>
</head>
<body>
<div class="header">
  <span class="title" id="title">Daily Energy</span>
  <span class="readout" id="readout">—</span>
</div>
<div class="body">
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div class="side">
    <div class="win"><div class="win-label">Morning</div><div class="win-time">10 AM – 12 PM</div><div class="win-desc">Low start · light tasks, admin</div></div>
    <div class="win-divider"></div>
    <div class="win"><div class="win-label">Cognitive Peak</div><div class="win-time">1 – 4 PM</div><div class="win-desc">Deep work · studying · finance</div></div>
    <div class="win-divider"></div>
    <div class="win"><div class="win-label">Physical Peak</div><div class="win-time" style="color:#94cfe3">6 – 8 PM</div><div class="win-desc">Best for training · peak output</div></div>
    <div class="win-divider"></div>
    <div class="win"><div class="win-label">Wind Down</div><div class="win-time" style="color:#94cfe3">9 PM+</div><div class="win-desc">Light reading · avoid screens</div></div>
  </div>
</div>
<div class="footer" id="footer">—</div>

<script>
const FALLBACK = {
  date_label: 'May 23',
  curve_24h: [28,18,10,6,5,5,6,8,10,14,30,52,65,60,68,76,72,80,82,78,66,52,38,26],
  footer: 'Wake 10:06 AM · Strength 47 min · No stims · Natural curve'
};

// Scrubber state shared between the pointer handlers and the crosshair plugin.
const scrub = { active:false, idx:0, val:0 };
let NOW_TEXT = '—';

function hourLabel(idxFloat){
  const h = Math.floor(idxFloat);
  const m = Math.round((idxFloat - h) * 60);
  const hh = ((h % 24) + 24) % 24;
  const mm = String(Math.min(59, Math.max(0, m))).padStart(2,'0');
  if (hh === 0)  return `12:${mm} AM`;
  if (hh < 12)   return `${hh}:${mm} AM`;
  if (hh === 12) return `12:${mm} PM`;
  return `${hh-12}:${mm} PM`;
}

function render(d) {
  Chart.defaults.color = 'rgba(255,255,255,.38)';
  Chart.defaults.borderColor = 'rgba(255,255,255,.05)';

  document.getElementById('title').textContent = 'Daily Energy — ' + (d.date_label || '');
  document.getElementById('footer').textContent = d.footer || '';

  const energyData = d.curve_24h || FALLBACK.curve_24h;
  const hours = Array.from({length:24}, (_,i)=>i);
  const labels = hours.map(h => h===0?'12a':h<12?h+'a':h===12?'12p':(h-12)+'p');

  const now = new Date();
  const nowHour = now.getHours() + now.getMinutes()/60;
  NOW_TEXT = `Now ${hourLabel(nowHour)}`;
  const readoutEl = document.getElementById('readout');
  readoutEl.textContent = NOW_TEXT;

  const sleepShade = { id:'sleepShade', beforeDraw(c){
    const {ctx,chartArea,scales}=c; if(!chartArea)return;
    const x1=scales.x.getPixelForValue(1.9), x2=scales.x.getPixelForValue(10.1);
    ctx.save(); ctx.fillStyle='rgba(45,125,210,.07)';
    ctx.fillRect(x1,chartArea.top,x2-x1,chartArea.bottom-chartArea.top); ctx.restore();
  }};
  const peakShade = { id:'peakShade', beforeDraw(c){
    const {ctx,chartArea,scales}=c; if(!chartArea)return;
    const x1=scales.x.getPixelForValue(17.9), x2=scales.x.getPixelForValue(20.1);
    ctx.save(); ctx.fillStyle='rgba(45,125,210,.10)';
    ctx.fillRect(x1,chartArea.top,x2-x1,chartArea.bottom-chartArea.top); ctx.restore();
  }};
  const nowLine = { id:'nowLine', afterDraw(c){
    const {ctx,chartArea,scales}=c; if(!chartArea)return;
    if (nowHour<0||nowHour>23||scrub.active) return;
    const x = scales.x.getPixelForValue(nowHour);
    ctx.save(); ctx.setLineDash([3,3]); ctx.strokeStyle='rgba(148,207,227,.40)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,chartArea.top); ctx.lineTo(x,chartArea.bottom); ctx.stroke(); ctx.restore();
  }};
  // The "stalk": a vertical line that tracks the finger/cursor with a glowing
  // dot snapped to the energy value at that moment.
  const crosshair = { id:'crosshair', afterDraw(c){
    const {ctx,chartArea,scales}=c; if(!chartArea||!scrub.active)return;
    const x = scales.x.getPixelForValue(scrub.idx);
    const y = scales.y.getPixelForValue(scrub.val);
    ctx.save();
    ctx.strokeStyle='rgba(148,207,227,.55)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,chartArea.top); ctx.lineTo(x,chartArea.bottom); ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2); ctx.fillStyle='rgba(148,207,227,.18)'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fillStyle='#bfe6f4';
    ctx.shadowColor='rgba(148,207,227,.9)'; ctx.shadowBlur=8; ctx.fill();
    ctx.shadowBlur=0;

    // Floating value pill that tracks the dot — shows the energy level at
    // the hovered time right where the cursor is.
    const pct = Math.round(scrub.val) + '%';
    ctx.font = '700 12px -apple-system,BlinkMacSystemFont,"Segoe UI","Inter",sans-serif';
    const tw = ctx.measureText(pct).width;
    const padX = 7, boxH = 20, boxW = tw + padX*2, r = 5;
    let bx = x + 11, by = y - boxH - 9;        // default: up-right of the dot
    if (bx + boxW > chartArea.right) bx = x - 11 - boxW;   // flip left near right edge
    if (by < chartArea.top) by = y + 9;                    // flip below near top edge
    if (bx < chartArea.left) bx = chartArea.left + 2;
    ctx.beginPath();
    ctx.moveTo(bx+r,by);
    ctx.arcTo(bx+boxW,by,bx+boxW,by+boxH,r);
    ctx.arcTo(bx+boxW,by+boxH,bx,by+boxH,r);
    ctx.arcTo(bx,by+boxH,bx,by,r);
    ctx.arcTo(bx,by,bx+boxW,by,r);
    ctx.closePath();
    ctx.fillStyle='rgba(20,28,34,.92)';
    ctx.strokeStyle='rgba(148,207,227,.55)'; ctx.lineWidth=1;
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(pct, bx+padX, by+boxH/2+0.5);
    ctx.restore();
  }};

  const ctx = document.getElementById('chart').getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,200);
  grad.addColorStop(0,'rgba(90,174,212,.30)'); grad.addColorStop(1,'rgba(90,174,212,.01)');

  const chart = new Chart(ctx, {
    type:'line', plugins:[sleepShade,peakShade,nowLine,crosshair],
    data:{ labels, datasets:[{ data:energyData, borderColor:'#5aaed4', borderWidth:2,
      backgroundColor:grad, fill:true, tension:0.45, pointRadius:0, pointHoverRadius:0 }]},
    options:{ responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{ legend:{display:false}, tooltip:{enabled:false} },
      scales:{
        x:{ ticks:{font:{size:8.5},color:'rgba(255,255,255,.35)',maxRotation:0,maxTicksLimit:12},
            grid:{display:false}, border:{display:false}},
        y:{ min:0,max:100,
            ticks:{font:{size:8.5},color:'rgba(255,255,255,.28)',stepSize:25,callback:v=>v===0?'':v+'%'},
            grid:{color:'rgba(255,255,255,.04)'}, border:{display:false}}
      }
    }
  });

  // ---- Scrubber wiring -------------------------------------------------
  const wrap = document.querySelector('.chart-wrap');

  function valueAt(idxFloat){
    const i = Math.max(0, Math.min(23, idxFloat));
    const lo = Math.floor(i), hi = Math.min(23, lo+1), f = i - lo;
    return energyData[lo] + (energyData[hi] - energyData[lo]) * f;
  }

  function moveTo(clientX){
    const area = chart.chartArea; if(!area) return;
    const rect = chart.canvas.getBoundingClientRect();
    let px = clientX - rect.left;
    px = Math.max(area.left, Math.min(area.right, px));
    let idx = chart.scales.x.getValueForPixel(px);
    idx = Math.max(0, Math.min(23, idx));
    scrub.active = true;
    scrub.idx = idx;
    scrub.val = valueAt(idx);
    readoutEl.classList.add('scrubbing');
    readoutEl.innerHTML = `${hourLabel(idx)} &nbsp;<span class="val">${Math.round(scrub.val)}%</span>`;
    chart.draw();
  }

  function endScrub(){
    if(!scrub.active) return;
    scrub.active = false;
    readoutEl.classList.remove('scrubbing');
    readoutEl.textContent = NOW_TEXT;
    chart.draw();
  }

  wrap.addEventListener('mousemove', e => moveTo(e.clientX));
  wrap.addEventListener('mouseleave', endScrub);
  wrap.addEventListener('touchstart', e => { moveTo(e.touches[0].clientX); }, {passive:true});
  wrap.addEventListener('touchmove',  e => { moveTo(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
  wrap.addEventListener('touchend', endScrub);
  wrap.addEventListener('touchcancel', endScrub);
}

(async function () {
  let d = FALLBACK;
  try {
    const r = await fetch('./data/data.json?t=' + Date.now(), { cache: 'no-store' });
    if (r.ok) {
      const all = await r.json();
      if (all && all.energy) d = all.energy;
    }
  } catch (e) {}
  render(d);
})();
</script>
<script>window.REFRESH_SECTIONS='energy';window.REFRESH_FORCE_ZEPP=true;</script>
<script src="./refresh.js"></script>
</body>
</html>
