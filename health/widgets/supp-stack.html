<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:220px;overflow:hidden;background:#191919;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif}
  body{display:flex;flex-direction:column;padding:12px 18px 10px}
  .header{font-size:9.5px;font-weight:700;text-transform:uppercase;
    letter-spacing:.6px;color:rgba(255,255,255,.35);margin-bottom:9px}
  .stack{display:flex;flex-direction:column;gap:5px;flex:1}
  .row{display:flex;align-items:center;gap:9px;padding:5px 8px;
       background:rgba(255,255,255,.03);border-radius:6px;
       border-left:3px solid transparent}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .info{flex:1;display:flex;flex-direction:column;gap:1px}
  .name{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.82);line-height:1}
  .desc{font-size:8.5px;color:rgba(255,255,255,.38);line-height:1.3}
  .dose{font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
  .timing{font-size:8px;color:rgba(255,255,255,.3);white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>
<div class="header">💊 Supplement Stack</div>
<div class="stack" id="stack"></div>

<script>
const supps = [
  {
    color: '#5aaed4',
    name:  'Creatine Monohydrate',
    desc:  'Strength · power output · cell hydration',
    dose:  '5 g',
    time:  'Post-workout or AM',
  },
  {
    color: '#f5c842',
    name:  'Vitamin D3 + K2',
    desc:  'Bone health · immune · testosterone support',
    dose:  '5k IU',
    time:  'With fat meal',
  },
  {
    color: '#e8943a',
    name:  'Magnesium Malate',
    desc:  'Energy production · muscle function',
    dose:  '400 mg',
    time:  'Morning',
  },
  {
    color: '#94cfe3',
    name:  'Magnesium Glycinate',
    desc:  'Sleep quality · recovery · nervous system',
    dose:  '400 mg',
    time:  'Evening',
  },
  {
    color: '#6bda87',
    name:  'Dandelion Root',
    desc:  'Digestion · bloat relief · liver support',
    dose:  '500 mg',
    time:  'With meals',
  },
];

const stack = document.getElementById('stack');
stack.innerHTML = supps.map(s => `
  <div class="row" style="border-left-color:${s.color}20;background:${s.color}08">
    <div class="dot" style="background:${s.color}"></div>
    <div class="info">
      <div class="name">${s.name}</div>
      <div class="desc">${s.desc}</div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div class="dose" style="color:${s.color}">${s.dose}</div>
      <div class="timing">${s.time}</div>
    </div>
  </div>`).join('');
</script>
</body>
</html>
