<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:380px;overflow:hidden;background:#191919;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif}
  body{display:flex;flex-direction:column;padding:14px 18px 12px}
  .header{font-size:9.5px;font-weight:700;text-transform:uppercase;
    letter-spacing:.6px;color:rgba(255,255,255,.35);margin-bottom:12px}
  .stack{display:flex;flex-direction:column;gap:8px;flex:1}
  .row{display:flex;align-items:center;gap:10px;padding:7px 10px;
       background:rgba(107,218,135,.06);border-radius:7px;
       border-left:3px solid rgba(107,218,135,.35)}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#6bda87}
  .info{flex:1;display:flex;flex-direction:column;gap:2px}
  .name{font-size:11px;font-weight:700;color:rgba(255,255,255,.82);line-height:1}
  .desc{font-size:8.5px;color:rgba(255,255,255,.38);line-height:1.3}
  .dose{font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;color:#6bda87}
  .timing{font-size:8px;color:rgba(255,255,255,.3);white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>
<div class="header">Supplement Stack</div>
<div class="stack" id="stack"></div>

<script>
const FALLBACK = [
  {name:'Creatine Monohydrate', desc:'Strength · power output · cell hydration', dose:'5 g',      time:'Post-workout or AM'},
  {name:'Vitamin D3 + K2',      desc:'Bone health · immune · testosterone support', dose:'5,000 IU', time:'With fat meal'},
  {name:'Magnesium Malate',     desc:'Energy production · muscle function',         dose:'400 mg',   time:'Morning'},
  {name:'Magnesium Glycinate',  desc:'Sleep quality · recovery · nervous system',   dose:'400 mg',   time:'Evening'},
  {name:'Dandelion Root',       desc:'Digestion · bloat relief · liver support',    dose:'500 mg',   time:'With meals'}
];

function render(supps) {
  const el = document.getElementById('stack');
  el.innerHTML = (supps || []).map(s => `
    <div class="row">
      <div class="dot"></div>
      <div class="info">
        <div class="name">${s.name}</div>
        <div class="desc">${s.desc || ''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="dose">${s.dose || ''}</div>
        <div class="timing">${s.time || ''}</div>
      </div>
    </div>`).join('');
}

(async function () {
  let d = FALLBACK;
  try {
    const r = await fetch('./data/data.json?t=' + Date.now(), { cache: 'no-store' });
    if (r.ok) {
      const all = await r.json();
      if (all && Array.isArray(all.supplements) && all.supplements.length) d = all.supplements;
    }
  } catch (e) {}
  render(d);
})();
</script>
</body>
</html>
